<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Pedidos — Jota</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--s1:#181818;--s2:#222;--b:#2e2e2e;--acc:#e8ff47;--acc2:#47ffd4;--red:#ff4747;--warn:#ffa547;--blue:#47b3ff;--purple:#b347ff;--txt:#f0f0f0;--muted:#888;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh}
header{background:var(--s1);border-bottom:1px solid var(--b);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem}.logo span{color:var(--acc)}
.hstats{display:flex;gap:20px}
.hstat{text-align:right}.hstat-l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}.hstat-v{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--acc)}
.controls{background:var(--s1);border-bottom:1px solid var(--b);padding:14px 28px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:180px;background:var(--s2);border:1px solid var(--b);border-radius:var(--r);padding:8px 12px;color:var(--txt);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--acc)}
.search::placeholder{color:var(--muted)}
.fbtn{background:var(--s2);border:1px solid var(--b);border-radius:var(--r);padding:7px 13px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.fbtn.active,.fbtn:hover{border-color:var(--acc);color:var(--acc)}
.fbtn.agendadas.active,.fbtn.agendadas:hover{border-color:var(--blue);color:var(--blue)}
.btn-acc{background:var(--acc);color:#000;border:none;border-radius:var(--r);padding:7px 16px;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-acc:hover{opacity:.85}
.btn-carga{background:var(--purple);color:#fff;border:none;border-radius:var(--r);padding:7px 16px;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-prog{background:linear-gradient(135deg,#00e5ff,#39ff6e);color:#000;border:none;border-radius:var(--r);padding:7px 16px;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;cursor:pointer;transition:opacity .2s;white-space:nowrap;letter-spacing:.3px}
.btn-prog:hover{opacity:.85}
.btn-carga:hover{opacity:.85}
main{padding:20px 28px}
.group-sec{margin-bottom:28px}
.group-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--b)}
.group-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem}
.gbadge{background:var(--s2);border:1px solid var(--b);border-radius:4px;padding:2px 7px;font-size:.65rem;color:var(--muted)}
.gpbar{flex:1;height:3px;background:var(--b);border-radius:2px;overflow:hidden}
.gpfill{height:100%;background:var(--acc2);border-radius:2px;transition:width .4s}
table{width:100%;border-collapse:collapse;font-size:.76rem}
thead th{background:var(--s2);padding:9px 10px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--b)}
tbody tr{border-bottom:1px solid var(--b);transition:background .15s}
tbody tr:hover{background:var(--s2)}
tbody tr.done{opacity:.45}
tbody tr.done td{text-decoration:line-through}
td{padding:9px 10px;vertical-align:middle}
.filial-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;margin-right:8px}
.filial-4{background:rgba(232,255,71,.15);color:var(--acc);border:1px solid rgba(232,255,71,.3)}
.filial-6{background:rgba(71,179,255,.15);color:var(--blue);border:1px solid rgba(71,179,255,.3)}
.pedido-num{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;color:var(--acc2)}
.data-badge{display:inline-block;background:var(--s2);border:1px solid var(--b);border-radius:4px;padding:2px 7px;font-size:.65rem;color:var(--muted)}
.sit-badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:.63rem;font-weight:500;white-space:nowrap}
.sit-Aprovado{background:rgba(71,255,212,.12);border:1px solid rgba(71,255,212,.3);color:var(--acc2)}
.sit-Concluído{background:rgba(232,255,71,.12);border:1px solid rgba(232,255,71,.3);color:var(--acc)}
.sit-Cancelado{background:rgba(255,71,71,.12);border:1px solid rgba(255,71,71,.3);color:var(--red)}
.sit-AguardandoAprovação{background:rgba(255,165,71,.12);border:1px solid rgba(255,165,71,.3);color:var(--warn)}
.saldo-cell{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem}
.saldo-zero{color:var(--acc)}
.saldo-partial{color:var(--warn)}
.saldo-full{color:var(--txt)}
.inp{background:var(--s1);border:1px solid var(--b);border-radius:6px;padding:5px 8px;color:var(--txt);font-family:'DM Mono',monospace;font-size:.76rem;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(232,255,71,.08)}
.inp-sm{width:80px;text-align:center}
.inp::-webkit-inner-spin-button,.inp::-webkit-outer-spin-button{-webkit-appearance:none}
.btn-entregar{background:transparent;border:1px solid var(--acc);border-radius:6px;padding:5px 11px;color:var(--acc);font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-entregar:hover{background:var(--acc);color:#000}
.btn-entregar:disabled{border-color:var(--b);color:var(--muted);cursor:not-allowed}
.btn-undo{background:transparent;border:1px solid var(--b);border-radius:6px;padding:5px 9px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.68rem;cursor:pointer;transition:all .2s}
.btn-undo:hover{border-color:var(--warn);color:var(--warn)}
.btn-agendar{background:transparent;border:1px solid var(--blue);border-radius:6px;padding:5px 11px;color:var(--blue);font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-agendar:hover{background:var(--blue);color:#000}
.agend-badge{display:inline-block;background:rgba(71,179,255,.15);border:1px solid rgba(71,179,255,.3);border-radius:4px;padding:1px 6px;font-size:.62rem;color:var(--blue);margin:1px}
.btn-agend-edit{background:transparent;border:1px solid var(--blue);border-radius:4px;padding:2px 6px;color:var(--blue);font-size:.65rem;cursor:pointer;transition:all .15s;line-height:1}
.btn-agend-edit:hover{background:var(--blue);color:#000}
.btn-agend-del{background:transparent;border:1px solid var(--red);border-radius:4px;padding:2px 6px;color:var(--red);font-size:.65rem;cursor:pointer;transition:all .15s;line-height:1}
.btn-agend-del:hover{background:var(--red);color:#fff}
.minibar{width:70px;height:4px;background:var(--b);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.minibar-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.hist-tag{display:inline-block;background:rgba(71,255,212,.1);border:1px solid rgba(71,255,212,.25);border-radius:4px;padding:1px 6px;font-size:.6rem;color:var(--acc2);margin:1px}
.coords-cell{display:flex;gap:4px;align-items:center}
.coords-cell .inp{width:90px;font-size:.7rem}
.toast{position:fixed;bottom:20px;right:20px;background:var(--acc);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;padding:9px 18px;border-radius:8px;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.175,.885,.32,1.275);z-index:999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:28px;width:min(520px,94vw);max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:18px;color:var(--acc)}
.form-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.form-group{flex:1;min-width:140px}
.form-group label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px}
.form-group select,.form-group input{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:8px 10px;color:var(--txt);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;transition:border-color .2s}
.form-group select:focus,.form-group input:focus{border-color:var(--acc)}
.form-group select option{background:var(--s2)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel-m{background:transparent;border:1px solid var(--b);border-radius:6px;padding:8px 18px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.76rem;cursor:pointer;transition:all .2s}
.btn-cancel-m:hover{border-color:var(--red);color:var(--red)}
.modal-pedidos-list{max-height:180px;overflow-y:auto;border:1px solid var(--b);border-radius:6px;margin-top:8px}
.mpitem{padding:8px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.mpitem:hover{background:var(--s2)}
.mpitem.sel{background:rgba(232,255,71,.08);border-left:3px solid var(--acc)}
.mpitem-info{flex:1;font-size:.72rem}
.mpitem-nome{color:var(--txt);font-weight:500}
.mpitem-det{color:var(--muted);font-size:.65rem;margin-top:2px}
.carga-info{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:12px;margin-bottom:14px;font-size:.74rem}
.carga-info strong{color:var(--acc);font-family:'Syne',sans-serif}
.empty{text-align:center;padding:50px;color:var(--muted);font-size:.82rem}
@media(max-width:700px){header,.controls,main{padding:12px 14px}.hstats{gap:10px}}
</style>
</head>
<body>
<header>
  <div class="logo">JOTA <span>PEDIDOS</span></div>
  <div class="hstats">
    <div class="hstat"><div class="hstat-l">Pedidos</div><div class="hstat-v" id="st-total">—</div></div>
    <div class="hstat"><div class="hstat-l">Concluídos</div><div class="hstat-v" id="st-conc">—</div></div>
    <div class="hstat"><div class="hstat-l">Pendentes</div><div class="hstat-v" id="st-pend">—</div></div>
    <div class="hstat"><div class="hstat-l">Agendados</div><div class="hstat-v" id="st-agend" style="color:var(--blue)">—</div></div>
  </div>
</header>
<div class="controls">
  <input class="search" id="busca" type="text" placeholder="Buscar cliente ou pedido..." oninput="render()">
  <button class="fbtn active" id="f-todos" onclick="setF('todos')">Todos</button>
  <button class="fbtn" id="f-pendentes" onclick="setF('pendentes')">Pendentes</button>
  <button class="fbtn agendadas" id="f-agendadas" onclick="setF('agendadas')">📅 Agendadas</button>
  <button class="fbtn" id="f-concluidos" onclick="setF('concluidos')">Concluídos</button>
  <button class="btn-carga" onclick="abrirModalCarga()">🚛 Lançar Carga</button>
  <button class="btn-acc" onclick="exportCSV()">⬇ CSV</button>
  <button class="btn-prog" onclick="window.location.href='programacao_entregas.html'">📊 Jota Prog</button>
</div>
<main id="main"></main>
<div class="toast" id="toast"></div>

<!-- Modal Agendamento -->
<div class="modal-overlay" id="modal-agend">
<div class="modal">
  <h2 id="agend-titulo">📅 Agendar Entrega</h2>
  <div id="agend-pedido-info" class="carga-info" style="display:none"></div>
  <div class="form-row">
    <div class="form-group">
      <label>Data de Entrega</label>
      <input type="date" id="agend-data">
    </div>
    <div class="form-group">
      <label>Horário (opcional)</label>
      <input type="time" id="agend-horario">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Ordem no Dia</label>
      <select id="agend-ordem">
        <option value="1">1ª entrega do dia</option>
        <option value="2">2ª entrega do dia</option>
        <option value="3">3ª entrega do dia</option>
      </select>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel-m" onclick="fecharModal('modal-agend')">Cancelar</button>
    <button class="btn-acc" id="agend-btn-salvar" onclick="salvarAgendamento()">Salvar Agendamento</button>
  </div>
</div>
</div>

<!-- Modal Lançar Carga -->
<div class="modal-overlay" id="modal-carga">
<div class="modal">
  <h2>🚛 Lançar Código de Carga</h2>
  <div class="form-row">
    <div class="form-group">
      <label>Código da Carga</label>
      <input type="text" id="carga-cod" placeholder="Ex: CRG-2026-001">
    </div>
    <div class="form-group">
      <label>Data da Carga</label>
      <input type="date" id="carga-data">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Placa do Veículo</label>
      <input type="text" id="carga-placa" placeholder="Ex: ABC-1234" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="form-group">
      <label>Ordem de Entrega</label>
      <select id="carga-ordem">
        <option value="1">1ª entrega do dia</option>
        <option value="2">2ª entrega do dia</option>
        <option value="3">3ª entrega do dia</option>
      </select>
    </div>
  </div>
  <div class="form-group" style="margin-bottom:14px">
    <label>Selecionar Pedidos para esta Carga</label>
    <input class="inp" style="width:100%;margin-bottom:8px" type="text" placeholder="Filtrar pedidos..." id="carga-busca" oninput="renderCargaPedidos()">
    <div class="modal-pedidos-list" id="carga-pedidos-list"></div>
  </div>
  <div id="carga-selecionados" style="font-size:.68rem;color:var(--muted);min-height:18px"></div>
  <div class="modal-footer">
    <button class="btn-cancel-m" onclick="fecharModal('modal-carga')">Cancelar</button>
    <button class="btn-acc" onclick="lancarCarga()">📥 Lançar e Exportar Excel</button>
  </div>
</div>
</div>

    nomes.forEach(cli=>{
      const itens=grupos[cli];
      const totalO=itens.reduce((a,r)=>a+r.e.saldoAtual+r.e.historico.reduce((b,h)=>b+h.qtd,0),0);
      const totalA=itens.reduce((a,r)=>a+r.e.saldoAtual,0);
      const pct=totalO>0?Math.round(((totalO-totalA)/totalO)*100):0;
      html+=`<div class="group-sec"><div class="group-hdr">
        <span class="group-name">${cli}</span>
        <span class="gbadge">${itens.length} pedido${itens.length>1?'s':''}</span>
        <div class="gpbar"><div class="gpfill" style="width:${pct}%"></div></div>
        <span style="font-size:.62rem;color:var(--muted)">${pct}% entregue</span>
      </div>
      <table><thead><tr>
        <th>Filial</th><th>Pedido</th><th>Data</th><th>Situação</th><th>Produtos / Saldo</th>
        <th>Lat / Lng</th><th>Entregar</th><th>Agendamentos</th><th>Histórico</th><th></th>
      </tr></thead><tbody>`;
      itens.forEach(row=>{
        const {id,numeroPedido,dataPedido,idFilial,situacao,e}=row;
        const conc=e.saldoAtual<=0&&e.historico.length>0;
        const sitKey=situacao.replace(/\s/g,'');
        const totalQtd=row.itens.reduce((a,x)=>a+x.quantidade,0);
        const entregue=totalQtd-e.saldoAtual;
        const pctI=totalQtd>0?Math.round((entregue/totalQtd)*100):0;
        const saldoClass=conc?'saldo-zero':(entregue>0?'saldo-partial':'saldo-full');
        const prodList=row.itens.map(x=>`<span style="font-size:.65rem;color:var(--muted)">${x.produto} <b style="color:var(--txt)">${fmt(x.quantidade)}</b></span>`).join('<br>');
        const histTags=e.historico.slice(-2).map(h=>`<span class="hist-tag">${fmt(h.qtd)}</span>`).join('');
        const agendTags=e.agendamentos.map((a,ai)=>`
          <div class="agend-item" style="display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap">
            <span class="agend-badge">📅 ${a.data}</span>
            <span class="agend-badge" style="background:rgba(71,179,255,.08)">${['','1ª','2ª','3ª'][a.ordem]||a.ordem+'ª'}</span>
            ${a.horario?`<span class="agend-badge" style="background:rgba(183,71,255,.15);border-color:rgba(183,71,255,.3);color:var(--purple)">⏰ ${a.horario}</span>`:''}
            <button class="btn-agend-edit" onclick="editarAgend(${id},${ai})" title="Reagendar">✏️</button>
            <button class="btn-agend-del" onclick="cancelarAgend(${id},${ai})" title="Cancelar">✕</button>
          </div>`).join('');
        html+=`<tr class="${conc?'done':''}">
          <td><span class="filial-badge filial-${idFilial}">${idFilial}</span></td>
          <td><span class="pedido-num">#${numeroPedido}</span></td>
          <td><span class="data-badge">${dataPedido}</span></td>
          <td><span class="sit-badge sit-${sitKey}">${situacao}</span></td>
          <td>
            <div>${prodList}</div>
            <div style="margin-top:4px">
              <span class="saldo-cell ${saldoClass}">${fmt(e.saldoAtual)}</span>
              <span class="minibar"><span class="minibar-fill" style="width:${pctI}%"></span></span>
              <span style="font-size:.62rem;color:var(--muted)">${pctI}%</span>
            </div>
          </td>
          <td>
            <div class="coords-cell">
              <input class="inp" style="width:88px;font-size:.68rem" type="text" placeholder="Lat" value="${e.coords.lat}" onchange="salvarCoords(${id},'lat',this.value)" title="Latitude">
              <input class="inp" style="width:88px;font-size:.68rem" type="text" placeholder="Lng" value="${e.coords.lng}" onchange="salvarCoords(${id},'lng',this.value)" title="Longitude">
            </div>
          </td>
          <td>
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <input class="inp inp-sm" id="inp-${id}" type="number" placeholder="Qtd" min="0.01" step="0.01" ${conc?'disabled':''} onkeydown="if(event.key==='Enter')entregar(${id})">
              <button class="btn-entregar" onclick="entregar(${id})" ${conc?'disabled':''}>${conc?'✓':'↓'}</button>
            </div>
          </td>
          <td>
            <div style="margin-bottom:4px">${agendTags||'<span style="color:var(--muted);font-size:.62rem">sem agenda</span>'}</div>
            <button class="btn-agendar" onclick="abrirAgend(${id})">+ Agendar</button>
          </td>
          <td>${histTags}${e.historico.length>2?`<span class="hist-tag">+${e.historico.length-2}</span>`:''}</td>
          <td>${e.historico.length?`<button class="btn-undo" onclick="desfazer(${id})" title="Desfazer">↩</button>`:''}</td>
        </tr>`;
      });
      html+='</tbody></table></div>';
    });
  }
  document.getElementById('main').innerHTML=html;
  atualizarStats();
}

function atualizarStats(){
  const tot=estado.length;
  const conc=estado.filter(e=>e.saldoAtual<=0&&e.historico.length>0).length;
  const agend=estado.filter(e=>e.agendamentos.length>0).length;
  document.getElementById('st-total').textContent=tot;
  document.getElementById('st-conc').textContent=conc;
  document.getElementById('st-pend').textContent=tot-conc;
  document.getElementById('st-agend').textContent=agend;
}

// ========== ENTREGAS ==========
function entregar(id){
  const inp=document.getElementById('inp-'+id);
  const val=parseFloat(inp.value.replace(',','.'));
  if(!val||val<=0){toast('⚠ Quantidade inválida');return;}
  const e=estado[id];
  if(val>e.saldoAtual){toast('⚠ Quantidade maior que o saldo!');return;}
  e.saldoAtual=Math.round((e.saldoAtual-val)*10000)/10000;
  e.historico.push({qtd:val,data:new Date().toLocaleString('pt-BR')});
  inp.value='';
  salvar();render();
  toast(`✓ ${fmt(val)} un. entregues — Pedido #${DADOS[id].numeroPedido}`);
}
function desfazer(id){
  const e=estado[id];
  if(!e.historico.length)return;
  const ult=e.historico.pop();
  e.saldoAtual=Math.round((e.saldoAtual+ult.qtd)*10000)/10000;
  salvar();render();toast('↩ Entrega desfeita');
}
function salvarCoords(id,campo,val){
  estado[id].coords[campo]=val;
  salvar();
}

// ========== AGENDAMENTO ==========
let agendEditIdx=null;
function abrirAgend(id){
  agendModalId=id;agendEditIdx=null;
  const d=DADOS[id];
  const info=document.getElementById('agend-pedido-info');
  info.style.display='block';
  info.innerHTML=`<strong>#${d.numeroPedido}</strong> — ${d.nomeCliente}<br><span style="color:var(--muted);font-size:.7rem">${d.dataPedido} · Filial ${d.idFilial}</span>`;
  document.getElementById('agend-titulo').textContent='📅 Agendar Entrega';
  document.getElementById('agend-btn-salvar').textContent='Salvar Agendamento';
  document.getElementById('agend-data').value='';
  document.getElementById('agend-horario').value='';
  document.getElementById('agend-ordem').value='1';
  document.getElementById('modal-agend').classList.add('show');
}
function editarAgend(id,ai){
  agendModalId=id;agendEditIdx=ai;
  const d=DADOS[id];
  const a=estado[id].agendamentos[ai];
  const info=document.getElementById('agend-pedido-info');
  info.style.display='block';
  info.innerHTML=`<strong>#${d.numeroPedido}</strong> — ${d.nomeCliente}<br><span style="color:var(--muted);font-size:.7rem">${d.dataPedido} · Filial ${d.idFilial}</span>`;
  document.getElementById('agend-titulo').textContent='✏️ Reagendar Entrega';
  document.getElementById('agend-btn-salvar').textContent='Salvar Alteração';
  // convert dd/mm/yyyy to yyyy-mm-dd
  const [dd,mm,aa]=a.data.split('/');
  document.getElementById('agend-data').value=`${aa}-${mm}-${dd}`;
  document.getElementById('agend-horario').value=a.horario||'';
  document.getElementById('agend-ordem').value=a.ordem||1;
  document.getElementById('modal-agend').classList.add('show');
}
function cancelarAgend(id,ai){
  if(!confirm('Cancelar este agendamento?'))return;
  estado[id].agendamentos.splice(ai,1);
  salvar();render();toast('🗑 Agendamento cancelado');
}
function salvarAgendamento(){
  const data=document.getElementById('agend-data').value;
  const ordem=document.getElementById('agend-ordem').value;
  const horario=document.getElementById('agend-horario').value;
  if(!data){toast('⚠ Selecione uma data');return;}
  const [a,m,d]=data.split('-');
  const dataFmt=`${d}/${m}/${a}`;
  const obj={data:dataFmt,ordem:parseInt(ordem),horario:horario||''};
  if(agendEditIdx!==null){
    estado[agendModalId].agendamentos[agendEditIdx]=obj;
    toast(`✅ Reagendado para ${dataFmt} (${ordem}ª)`);
  } else {
    estado[agendModalId].agendamentos.push(obj);
    toast(`📅 Entrega agendada para ${dataFmt} (${ordem}ª)`);
  }
  salvar();fecharModal('modal-agend');render();
}

// ========== LANÇAR CARGA ==========
function abrirModalCarga(){
  cargaSelecionados.clear();
  document.getElementById('carga-cod').value='';
  document.getElementById('carga-placa').value='';
  document.getElementById('carga-busca').value='';
  const hoje=new Date().toISOString().slice(0,10);
  document.getElementById('carga-data').value=hoje;
  renderCargaPedidos();
  document.getElementById('modal-carga').classList.add('show');
}
function renderCargaPedidos(){
  const q=document.getElementById('carga-busca').value.toLowerCase();
  const lista=document.getElementById('carga-pedidos-list');
  let html='';
  DADOS.forEach((d,i)=>{
    const e=estado[i];
    if(e.saldoAtual<=0&&e.historico.length>0)return;
    if(q&&!d.nomeCliente.toLowerCase().includes(q)&&!String(d.numeroPedido).includes(q))return;
    const sel=cargaSelecionados.has(i);
    html+=`<div class="mpitem${sel?' sel':''}" onclick="toggleCarga(${i})">
      <div style="width:16px;height:16px;border-radius:3px;border:1px solid ${sel?'var(--acc)':'var(--b)'};background:${sel?'var(--acc)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${sel?'<span style="color:#000;font-size:10px">✓</span>':''}
      </div>
      <div class="mpitem-info">
        <div class="mpitem-nome">#${d.numeroPedido} — ${d.nomeCliente}</div>
        <div class="mpitem-det">${d.dataPedido} · Filial ${d.idFilial} · Saldo: ${fmt(e.saldoAtual)}</div>
      </div>
    </div>`;
  });
  lista.innerHTML=html||'<div style="padding:12px;color:var(--muted);font-size:.72rem">Nenhum pedido pendente</div>';
  document.getElementById('carga-selecionados').textContent=cargaSelecionados.size?`${cargaSelecionados.size} pedido(s) selecionado(s)`:'';
}
function toggleCarga(i){
  if(cargaSelecionados.has(i))cargaSelecionados.delete(i);
  else cargaSelecionados.add(i);
  renderCargaPedidos();
}
function lancarCarga(){
  const cod=document.getElementById('carga-cod').value.trim();
  const data=document.getElementById('carga-data').value;
  const placa=document.getElementById('carga-placa').value.trim();
  const ordem=document.getElementById('carga-ordem').value;
  if(!cod){toast('⚠ Informe o código da carga');return;}
  if(!data){toast('⚠ Informe a data');return;}
  if(!placa){toast('⚠ Informe a placa');return;}
  if(!cargaSelecionados.size){toast('⚠ Selecione pelo menos 1 pedido');return;}
  const [a,m,d]=data.split('-');
  const dataFmt=`${d}/${m}/${a}`;
  const cargaObj={cod,data:dataFmt,placa,ordem:parseInt(ordem)};
  cargaSelecionados.forEach(i=>estado[i].cargas.push(cargaObj));
  salvar();
  gerarExcelCarga(cod,dataFmt,placa,ordem);
  fecharModal('modal-carga');render();
  toast(`🚛 Carga ${cod} lançada — ${cargaSelecionados.size} pedido(s)`);
  cargaSelecionados.clear();
}
function gerarExcelCarga(cod,data,placa,ordem){
  const ordemStr=['','1ª','2ª','3ª'][parseInt(ordem)]||ordem+'ª';
  let csv='\uFEFFCódigo Carga\tData\tPlaca\tOrdem\tFilial\tCód. Cliente\tCliente\tNº Pedido\tData Pedido\tProduto\tSaldo Atual\tLat\tLng\n';
  cargaSelecionados.forEach(i=>{
    const d=DADOS[i];const e=estado[i];
    d.itens.forEach(it=>{
      csv+=`${cod}\t${data}\t${placa}\t${ordemStr}\t${d.idFilial}\t${d.codigoCliente}\t${d.nomeCliente}\t${d.numeroPedido}\t${d.dataPedido}\t${it.produto}\t${fmt(it.quantidade)}\t${e.coords.lat||''}\t${e.coords.lng||''}\n`;
    });
  });
  const blob=new Blob([csv],{type:'text/tab-separated-values;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`carga_${cod}_${data.replace(/\//g,'-')}.tsv`;
  a.click();URL.revokeObjectURL(url);
  setTimeout(()=>toast('📥 Arquivo exportado!'),300);
}

// ========== EXPORT CSV ==========
function exportCSV(){
  let csv='\uFEFFFilial\tCód. Cliente\tCliente\tNº Pedido\tData Pedido\tSituação\tProduto\tQtd. Original\tSaldo Atual\tTotal Entregue\tLat\tLng\tAgendamentos\tCargas\n';
  DADOS.forEach((d,i)=>{
    const e=estado[i];
    d.itens.forEach(it=>{
      const agend=e.agendamentos.map(a=>`${a.data}(${a.ordem}ª)`).join(';');
      const cargas=e.cargas.map(c=>`${c.cod}/${c.data}/${c.placa}`).join(';');
      csv+=`${d.idFilial}\t${d.codigoCliente}\t${d.nomeCliente}\t${d.numeroPedido}\t${d.dataPedido}\t${d.situacao}\t${it.produto}\t${fmt(it.quantidade)}\t${fmt(e.saldoAtual)}\t${fmt(it.quantidade-e.saldoAtual)}\t${e.coords.lat||''}\t${e.coords.lng||''}\t${agend}\t${cargas}\n`;
    });
  });
  const blob=new Blob([csv],{type:'text/tab-separated-values;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`pedidos_${new Date().toISOString().slice(0,10)}.tsv`;
  a.click();URL.revokeObjectURL(url);
  toast('📥 CSV exportado!');
}
// close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show')});
});
render();
</script>
</body>
</html>
